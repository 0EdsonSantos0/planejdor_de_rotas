<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Logística A* Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container-fluid py-4">
    <div class="row">
        <!-- Coluna da Esquerda: Configurações -->
        <div class="col-md-4">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-dark text-white">⚙️ Configuração Inicial</div>
                <div class="card-body">
                    <label>Origem:</label>
                    <select id="origem" class="form-select mb-2">
                        <option value="AC">AC - Acre</option>
                        <option value="AL">AL - Alagoas</option>
                        <option value="AP">AP - Amapá</option>
                        <option value="AM">AM - Amazonas</option>
                        <option value="BA">BA - Bahia</option>
                        <option value="CE">CE - Ceará</option>
                        <option value="DF">DF - Distrito Federal</option>
                        <option value="ES">ES - Espírito Santo</option>
                        <option value="GO">GO - Goiás</option>
                        <option value="MA">MA - Maranhão</option>
                        <option value="MT">MT - Mato Grosso</option>
                        <option value="MS">MS - Mato Grosso do Sul</option>
                        <option value="MG">MG - Minas Gerais</option>
                        <option value="PA">PA - Pará</option>
                        <option value="PB">PB - Paraíba</option>
                        <option value="PR">PR - Paraná</option>
                        <option value="PE">PE - Pernambuco</option>
                        <option value="PI">PI - Piauí</option>
                        <option value="RJ">RJ - Rio de Janeiro</option>
                        <option value="RN">RN - Rio Grande do Norte</option>
                        <option value="RS">RS - Rio Grande do Sul</option>
                        <option value="RO">RO - Rondônia</option>
                        <option value="RR">RR - Roraima</option>
                        <option value="SC">SC - Santa Catarina</option>
                        <option value="SP" selected>SP - São Paulo</option>
                        <option value="SE">SE - Sergipe</option>
                        <option value="TO">TO - Tocantins</option>
                    </select>

                    <label>Veículo:</label>
                    <select id="veiculo" class="form-select mb-3">
                        <option value="TOCO,100,80.0">Toco (100 vol, 80 km/h)</option>
                        <option value="VUC,50,70.0">VUC (50 vol, 70 km/h)</option>
                    </select>

                    <hr>
                    <h5>📦 Adicionar Pedido</h5>
                    <div class="input-group mb-2">
                        <span class="input-group-text">Destino</span>
                        <select id="ped_dest" class="form-select">
                            <option value="AC">AC - Acre</option>
                            <option value="AL">AL - Alagoas</option>
                            <option value="AP">AP - Amapá</option>
                            <option value="AM">AM - Amazonas</option>
                            <option value="BA" selected>BA - Bahia</option>
                            <option value="CE">CE - Ceará</option>
                            <option value="DF">DF - Distrito Federal</option>
                            <option value="ES">ES - Espírito Santo</option>
                            <option value="GO">GO - Goiás</option>
                            <option value="MA">MA - Maranhão</option>
                            <option value="MT">MT - Mato Grosso</option>
                            <option value="MS">MS - Mato Grosso do Sul</option>
                            <option value="MG">MG - Minas Gerais</option>
                            <option value="PA">PA - Pará</option>
                            <option value="PB">PB - Paraíba</option>
                            <option value="PR">PR - Paraná</option>
                            <option value="PE">PE - Pernambuco</option>
                            <option value="PI">PI - Piauí</option>
                            <option value="RJ">RJ - Rio de Janeiro</option>
                            <option value="RN">RN - Rio Grande do Norte</option>
                            <option value="RS">RS - Rio Grande do Sul</option>
                            <option value="RO">RO - Rondônia</option>
                            <option value="RR">RR - Roraima</option>
                            <option value="SC">SC - Santa Catarina</option>
                            <option value="SP">SP - São Paulo</option>
                            <option value="SE">SE - Sergipe</option>
                            <option value="TO">TO - Tocantins</option>
                        </select>
                    </div>
                    <div class="input-group mb-2">
                        <span class="input-group-text">Volume</span>
                        <input type="number" id="ped_vol" class="form-control" value="20">
                    </div>
                    <div class="input-group mb-2">
                        <span class="input-group-text">Prazo (h)</span>
                        <input type="number" id="ped_prazo" class="form-control" value="48">
                    </div>
                    <button class="btn btn-outline-primary w-100" onclick="addPedido()">+ Adicionar Pedido</button>
                    
                    <ul id="lista_pedidos" class="list-group mt-3"></ul>
                    
                    <button class="btn btn-success w-100 mt-3" onclick="iniciarSimulacao()">🚀 Iniciar Simulação</button>
                </div>
            </div>

            <!-- Painel de Trânsito (Fica oculto até a simulação começar) -->
            <div class="card shadow-sm border-warning" id="painel_transito" style="display: none;">
                <div class="card-header bg-warning text-dark">⚠️ Reportar Engarrafamento</div>
                <div class="card-body">
                    <p class="small text-muted">A partir da localização atual, escolha a rodovia com lentidão:</p>
                    <select id="transito_destino" class="form-select mb-2"></select>
                    <input type="number" id="transito_fator" class="form-control mb-2" placeholder="Fator (ex: 2.0 = dobro do tempo)" step="0.1" value="2.0">
                    <button class="btn btn-warning w-100" onclick="reportarTransito()">Atualizar Trânsito</button>
                </div>
            </div>
        </div>

        <!-- Coluna da Direita: Mapa e Status -->
        <div class="col-md-8">
            <div class="card shadow-sm mb-3">
                <div class="card-body text-center bg-white">
                    <h4 class="mb-0" id="status_titulo">Aguardando Início...</h4>
                    <p class="text-muted mb-0" id="status_rota"></p>
                    
                    <!-- Botão para avançar a viagem -->
                    <button id="btn_avancar" class="btn btn-primary mt-2 px-5" style="display: none;" onclick="avancarPasso()">🚚 Viajar para o Próximo Ponto</button>
                </div>
            </div>

            <!-- Onde o mapa Folium será injetado -->
            <div class="card shadow-sm">
                <iframe id="mapa_iframe" style="width: 100%; height: 600px; border: none; border-radius: 5px;"></iframe>
            </div>
        </div>
    </div>
</div>

<script>
    let pedidos = [];
    let pedidoCount = 1;

    function addPedido() {
        const dest = document.getElementById('ped_dest').value.toUpperCase();
        const vol = document.getElementById('ped_vol').value;
        const prazo = document.getElementById('ped_prazo').value;
        if(!dest) return;

        pedidos.push({ id: `P${pedidoCount}`, destino: dest, volume: vol, janela: prazo });
        
        const li = document.createElement('li');
        li.className = 'list-group-item d-flex justify-content-between align-items-center';
        li.innerText = `P${pedidoCount} -> ${dest} (Vol: ${vol}, ${prazo}h)`;
        document.getElementById('lista_pedidos').appendChild(li);
        pedidoCount++;
    }

    async function iniciarSimulacao() {
        if(pedidos.length === 0) return alert("Adicione ao menos um pedido!");

        const veicData = document.getElementById('veiculo').value.split(',');
        const payload = {
            origem: document.getElementById('origem').value,
            veiculo: veicData[0], capacidade: veicData[1], velocidade: veicData[2],
            pedidos: pedidos
        };

        const res = await fetch('/api/iniciar', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        atualizarDashboard(await res.json());
    }

    async function avancarPasso() {
        const res = await fetch('/api/avancar', { method: 'POST' });
        atualizarDashboard(await res.json());
    }

    async function reportarTransito() {
        const dest = document.getElementById('transito_destino').value;
        const fator = document.getElementById('transito_fator').value;
        const res = await fetch('/api/transito', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ destino: dest, fator: fator })
        });
        atualizarDashboard(await res.json());
    }

    function atualizarDashboard(data) {
            if(data.status === 'erro') return alert(data.msg);
            
            // Renderiza o mapa HTML dentro do Iframe
            document.getElementById('mapa_iframe').srcdoc = data.html_mapa;

            if(data.status === 'concluido') {
                document.getElementById('status_titulo').innerText = "✅ Todas as entregas concluídas!";
                
                // INJETAMOS O RESUMO FINAL AQUI
                document.getElementById('status_rota').innerHTML = `
                    <div class="mt-3 p-3 bg-light border rounded text-start d-inline-block">
                        <strong>📍 Trajeto Percorrido:</strong> ${data.trajeto_total} <br>
                        <strong>📏 Distância Total:</strong> ${data.distancia_total} km <br>
                        <strong>⏱️ Tempo Total:</strong> ${data.tempo_total} horas
                    </div>
                `;
                
                document.getElementById('btn_avancar').style.display = 'none';
                document.getElementById('painel_transito').style.display = 'none';
                return;
            }

            // Atualiza os textos normais durante a viagem
            document.getElementById('status_titulo').innerText = `📍 Atual: ${data.local_atual} | ⏱️ Tempo: ${data.tempo_acumulado}h | 📦 Restam: ${data.pedidos_restantes}`;
            document.getElementById('status_rota').innerText = `Próxima Rota: ${data.proxima_rota}`;
            
            // Exibe os controles de simulação
            document.getElementById('btn_avancar').style.display = 'inline-block';
            document.getElementById('painel_transito').style.display = 'block';

            // Atualiza as opções do Select de Trânsito baseado em onde o caminhão está
            const selectDest = document.getElementById('transito_destino');
            selectDest.innerHTML = '';
            data.vizinhos.forEach(viz => {
                selectDest.innerHTML += `<option value="${viz}">Sentido: ${viz}</option>`;
            });
        }
</script>
</body>
</html>
